name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.23'

    - name: Build (Linux)
      run: GOOS=linux GOARCH=amd64 go build -v -o bin/ocr-linux ./src/

    - name: Build (macOS)
      run: GOOS=darwin GOARCH=arm64 go build -v -o bin/ocr-macos ./src/

    - name: Test
      run: go test -v ./...
